<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>

    <link rel="stylesheet" href="./style.css">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" rel="stylesheet" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <script src="./script.js" defer></script>
</head>
<body>
    <button class="chatbot-toggler">
        <span class="material-symbols-outlined">smart_toy</span>
        <span class="material-symbols-outlined">close</span>
    </button>
    <div class="chatbot">
        <header>
            <h2 id="titulo-chatbot">BANCO GNB</h2>
            <span class="btn-cerrar material-symbols-outlined">close</span>
        </header>
        <ul class="chatbox">
            <!--<li class="chat incoming">
                <span class="material-symbols-outlined">smart_toy</span>
                <p>Hola 😎 ¿En que puedo ayudarte?</p>
            </li>
            <li class="chat" style="flex-direction: column;row-gap: 10px;">
                <button class="btn-opcion">📥 Reporte Mensual</button>
                <button class="btn-opcion">📥 Reporte Trimestral</button>
            </li>-->
        </ul>
        <div id="chatTexto" class="chat-input d-none">
            <textarea name="chat" id="chat" placeholder="Ingresa tu mensaje" required></textarea>
            <span id="btn-enviar-chat" class="material-symbols-outlined">send</span>
        </div>
        <div id="chatNuevo" class="chat-input">
            <button id="btn-iniciar-chat" class="btn-opcion">Iniciar Conversación</button>
        </div>
    </div>
</body>
</html>
